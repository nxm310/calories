<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriScan">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>NutriScan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg-primary: #000000;
    --bg-secondary: #1c1c1e;
    --bg-tertiary: #2c2c2e;
    --bg-elevated: #3a3a3c;
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #636366;
    --accent: #0a84ff;
    --accent-dim: rgba(10, 132, 255, 0.15);
    --border: rgba(255, 255, 255, 0.08);
    --separator: rgba(255, 255, 255, 0.05);

    /* Nutri-Score */
    --nutri-a: #038141;
    --nutri-b: #85bb2f;
    --nutri-c: #fecb02;
    --nutri-d: #ee8100;
    --nutri-e: #e63e11;
    --nutri-unknown: var(--bg-elevated);

    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: calc(var(--safe-top) + 8px) 20px 12px;
    background: rgba(0,0,0,0.72);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--border);
  }
  .header h1 {
    font-size: 17px; font-weight: 600; text-align: center;
    letter-spacing: -0.02em;
  }
  .header-subtitle {
    font-size: 11px; color: var(--text-tertiary); text-align: center;
    margin-top: 2px; letter-spacing: 0.02em; text-transform: uppercase;
  }

  /* ── Main ── */
  .main {
    padding: calc(var(--safe-top) + 72px) 16px calc(var(--safe-bottom) + 24px);
    max-width: 500px; margin: 0 auto;
  }

  /* ── Scanner Area ── */
  .scanner-wrapper {
    position: relative;
    border-radius: var(--radius-xl);
    overflow: hidden;
    background: var(--bg-secondary);
    aspect-ratio: 4/3;
    margin-bottom: 20px;
  }
  #reader {
    width: 100%; height: 100%;
  }
  #reader video { object-fit: cover !important; border-radius: var(--radius-xl) !important; }
  /* hide html5-qrcode default UI */
  #reader__dashboard, #reader__status_span, #reader__header_message,
  #reader img[alt="Info icon"], #reader__scan_region img,
  #reader__dashboard_section_csr, #reader__dashboard_section_fsr { display: none !important; }
  #reader__scan_region { border: none !important; min-height: 100% !important; }
  #reader__scan_region video { border-radius: 0 !important; }

  .scanner-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }
  .scan-frame {
    width: 72%; aspect-ratio: 2.5/1;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: var(--radius-md);
    position: relative;
  }
  .scan-line {
    position: absolute; left: 8%; right: 8%; height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent), 0 0 28px var(--accent);
    border-radius: 2px;
    animation: scanPulse 2.2s ease-in-out infinite;
  }
  @keyframes scanPulse {
    0%, 100% { top: 15%; opacity: 0.6; }
    50% { top: 80%; opacity: 1; }
  }

  .scanner-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: var(--text-tertiary);
  }
  .scanner-placeholder svg { width: 48px; height: 48px; opacity: 0.4; }
  .scanner-placeholder span { font-size: 15px; font-weight: 500; }

  /* ── Scan Button ── */
  .scan-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px;
    background: var(--accent);
    color: #fff; border: none; border-radius: var(--radius-md);
    font-family: inherit; font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer; transition: all 0.2s;
    margin-bottom: 12px;
  }
  .scan-btn:active { transform: scale(0.97); filter: brightness(0.85); }
  .scan-btn.scanning { background: var(--bg-tertiary); }
  .scan-btn svg { width: 22px; height: 22px; }

  /* ── Manual Input ── */
  .manual-row {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .manual-input {
    flex: 1; padding: 14px 16px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-md); color: var(--text-primary);
    font-family: inherit; font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .manual-input::placeholder { color: var(--text-tertiary); }
  .manual-input:focus { border-color: var(--accent); }
  .manual-go {
    padding: 14px 20px; background: var(--bg-tertiary);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    color: var(--text-primary); font-family: inherit;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .manual-go:active { transform: scale(0.96); }

  /* ── Product Card ── */
  .product-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 16px;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-hero {
    display: flex; gap: 16px; padding: 20px;
  }
  .product-img {
    width: 88px; height: 88px; border-radius: var(--radius-md);
    background: var(--bg-tertiary); object-fit: contain; flex-shrink: 0;
  }
  .product-img-placeholder {
    width: 88px; height: 88px; border-radius: var(--radius-md);
    background: var(--bg-tertiary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .product-img-placeholder svg { width: 32px; height: 32px; color: var(--text-tertiary); }
  .product-info { flex: 1; min-width: 0; }
  .product-brand { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .product-name { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
  .product-quantity { font-size: 13px; color: var(--text-secondary); }

  /* ── Nutri-Score ── */
  .nutriscore-row {
    display: flex; gap: 0; padding: 0 20px 16px;
  }
  .nutriscore-cell {
    flex: 1; padding: 8px 0; text-align: center;
    font-size: 13px; font-weight: 700; color: #fff;
    opacity: 0.3; transition: all 0.3s;
  }
  .nutriscore-cell:first-child { border-radius: 8px 0 0 8px; }
  .nutriscore-cell:last-child { border-radius: 0 8px 8px 0; }
  .nutriscore-cell.active { opacity: 1; transform: scaleY(1.15); font-size: 15px; }
  .nutriscore-a { background: var(--nutri-a); }
  .nutriscore-b { background: var(--nutri-b); color: #1a1a1a; }
  .nutriscore-c { background: var(--nutri-c); color: #1a1a1a; }
  .nutriscore-d { background: var(--nutri-d); }
  .nutriscore-e { background: var(--nutri-e); }

  /* ── Nutrition Grid ── */
  .nutrition-section {
    padding: 0 20px 20px;
  }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-tertiary); margin-bottom: 12px; font-weight: 600;
  }
  .nutrition-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .nutri-tile {
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .nutri-tile-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .nutri-tile-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .nutri-tile-unit { font-size: 13px; color: var(--text-secondary); font-weight: 400; }

  .nutri-tile.energy { grid-column: 1 / -1; }
  .nutri-tile.energy .nutri-tile-value { font-size: 28px; }

  /* ── Ingredients ── */
  .ingredients-section {
    padding: 0 20px 20px;
  }
  .ingredients-text {
    font-size: 14px; line-height: 1.6; color: var(--text-secondary);
  }

  /* ── History ── */
  .history-section { margin-top: 8px; }
  .history-title {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-tertiary); font-weight: 600; margin-bottom: 12px;
  }
  .history-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    margin-bottom: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:active { background: var(--bg-tertiary); }
  .history-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .history-item-info { flex: 1; min-width: 0; }
  .history-item-name {
    font-size: 15px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .history-item-brand { font-size: 12px; color: var(--text-tertiary); }
  .history-item-grade { font-size: 14px; font-weight: 700; }

  /* ── Status ── */
  .status-msg {
    text-align: center; padding: 40px 20px; color: var(--text-tertiary);
    font-size: 15px;
  }
  .status-msg.error { color: var(--nutri-e); }

  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--bg-tertiary);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 24px);
    left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--bg-elevated);
    color: var(--text-primary);
    padding: 12px 24px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }
  .toast.visible { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>NutriScan</h1>
  <div class="header-subtitle">Scanner nutritionnel</div>
</div>

<div class="main">
  <!-- Scanner -->
  <div class="scanner-wrapper" id="scannerWrapper">
    <div id="reader"></div>
    <div class="scanner-placeholder" id="scannerPlaceholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
        <line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
      <span>Appuyer pour scanner</span>
    </div>
    <div class="scanner-overlay" id="scannerOverlay" style="display:none;">
      <div class="scan-frame"><div class="scan-line"></div></div>
    </div>
  </div>

  <!-- Controls -->
  <button class="scan-btn" id="scanBtn" onclick="toggleScan()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
    </svg>
    <span id="scanBtnText">Scanner un produit</span>
  </button>

  <div class="manual-row">
    <input class="manual-input" id="barcodeInput" type="text" inputmode="numeric"
           placeholder="Code-barres…" maxlength="13">
    <button class="manual-go" onclick="manualLookup()">Chercher</button>
  </div>

  <!-- Result -->
  <div id="resultArea"></div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-title">Historique récent</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let scanner = null;
  let isScanning = false;
  let history = JSON.parse(localStorage.getItem('nutriscan_history') || '[]');

  const gradeColors = {
    a: '#038141', b: '#85bb2f', c: '#fecb02', d: '#ee8100', e: '#e63e11'
  };

  // ── Init ──
  renderHistory();

  // ── Scanner ──
  async function toggleScan() {
    if (isScanning) {
      stopScan();
    } else {
      startScan();
    }
  }

  async function startScan() {
    const btn = document.getElementById('scanBtn');
    const btnText = document.getElementById('scanBtnText');
    const placeholder = document.getElementById('scannerPlaceholder');
    const overlay = document.getElementById('scannerOverlay');

    try {
      scanner = new Html5Qrcode('reader');

      await scanner.start(
        { facingMode: 'environment' },
        {
          fps: 10,
          qrbox: { width: 280, height: 120 },
          aspectRatio: 1.7778,
          videoConstraints: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        },
        onScanSuccess,
        () => {}
      );

      isScanning = true;
      placeholder.style.display = 'none';
      overlay.style.display = 'flex';
      btn.classList.add('scanning');
      btnText.textContent = 'Arrêter le scan';

    } catch (err) {
      console.error(err);
      showToast('Caméra inaccessible. Vérifiez les permissions.');
    }
  }

  function stopScan() {
    if (scanner) {
      scanner.stop().then(() => {
        scanner.clear();
        scanner = null;
      }).catch(() => {});
    }
    isScanning = false;

    const btn = document.getElementById('scanBtn');
    const btnText = document.getElementById('scanBtnText');
    const placeholder = document.getElementById('scannerPlaceholder');
    const overlay = document.getElementById('scannerOverlay');

    placeholder.style.display = 'flex';
    overlay.style.display = 'none';
    btn.classList.remove('scanning');
    btnText.textContent = 'Scanner un produit';
  }

  function onScanSuccess(code) {
    stopScan();
    showToast('Code détecté : ' + code);
    fetchProduct(code);
  }

  // ── Manual ──
  function manualLookup() {
    const input = document.getElementById('barcodeInput');
    const code = input.value.trim();
    if (!code) return;
    input.blur();
    fetchProduct(code);
  }

  document.getElementById('barcodeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') manualLookup();
  });

  // ── API ──
  async function fetchProduct(barcode) {
    const area = document.getElementById('resultArea');
    area.innerHTML = '<div class="spinner"></div>';

    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}?fields=product_name,brands,quantity,image_front_small_url,nutriscore_grade,nutriments,ingredients_text_fr,nova_group`);
      const data = await res.json();

      if (data.status !== 1) {
        area.innerHTML = '<div class="status-msg error">Produit non trouvé pour ce code-barres.</div>';
        return;
      }

      const p = data.product;
      addToHistory(barcode, p);
      renderProduct(p, area);

    } catch (err) {
      area.innerHTML = '<div class="status-msg error">Erreur réseau. Vérifiez votre connexion.</div>';
    }
  }

  // ── Render Product ──
  function renderProduct(p, container) {
    const grade = (p.nutriscore_grade || '').toLowerCase();
    const n = p.nutriments || {};

    const imgHtml = p.image_front_small_url
      ? `<img class="product-img" src="${p.image_front_small_url}" alt="" loading="lazy">`
      : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;

    const grades = ['a','b','c','d','e'];
    const nutriscoreHtml = grades.map(g =>
      `<div class="nutriscore-cell nutriscore-${g} ${g === grade ? 'active' : ''}">${g.toUpperCase()}</div>`
    ).join('');

    const val = (v, unit = 'g') => v != null ? `${Number(v).toFixed(1)} <span class="nutri-tile-unit">${unit}</span>` : '–';

    container.innerHTML = `
      <div class="product-card">
        <div class="product-hero">
          ${imgHtml}
          <div class="product-info">
            <div class="product-brand">${p.brands || 'Marque inconnue'}</div>
            <div class="product-name">${p.product_name || 'Produit inconnu'}</div>
            ${p.quantity ? `<div class="product-quantity">${p.quantity}</div>` : ''}
          </div>
        </div>

        ${grade ? `<div class="nutriscore-row">${nutriscoreHtml}</div>` : ''}

        <div class="nutrition-section">
          <div class="section-label">Valeurs nutritionnelles · 100 g</div>
          <div class="nutrition-grid">
            <div class="nutri-tile energy">
              <div class="nutri-tile-label">Énergie</div>
              <div class="nutri-tile-value">${val(n['energy-kcal_100g'], 'kcal')}</div>
            </div>
            <div class="nutri-tile">
              <div class="nutri-tile-label">Lipides</div>
              <div class="nutri-tile-value">${val(n.fat_100g)}</div>
            </div>
            <div class="nutri-tile">
              <div class="nutri-tile-label">Saturés</div>
              <div class="nutri-tile-value">${val(n['saturated-fat_100g'])}</div>
            </div>
            <div class="nutri-tile">
              <div class="nutri-tile-label">Glucides</div>
              <div class="nutri-tile-value">${val(n.carbohydrates_100g)}</div>
            </div>
            <div class="nutri-tile">
              <div class="nutri-tile-label">Sucres</div>
              <div class="nutri-tile-value">${val(n.sugars_100g)}</div>
            </div>
            <div class="nutri-tile">
              <div class="nutri-tile-label">Protéines</div>
              <div class="nutri-tile-value">${val(n.proteins_100g)}</div>
            </div>
            <div class="nutri-tile">
              <div class="nutri-tile-label">Sel</div>
              <div class="nutri-tile-value">${val(n.salt_100g)}</div>
            </div>
          </div>
        </div>

        ${p.ingredients_text_fr ? `
        <div class="ingredients-section">
          <div class="section-label">Ingrédients</div>
          <div class="ingredients-text">${p.ingredients_text_fr}</div>
        </div>` : ''}
      </div>
    `;
  }

  // ── History ──
  function addToHistory(barcode, p) {
    const grade = (p.nutriscore_grade || '').toLowerCase();
    const item = {
      barcode,
      name: p.product_name || 'Inconnu',
      brand: p.brands || '',
      grade,
      img: p.image_front_small_url || null
    };
    history = [item, ...history.filter(h => h.barcode !== barcode)].slice(0, 20);
    localStorage.setItem('nutriscan_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (!history.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.slice(0, 5).map(h => `
      <div class="history-item" onclick="fetchProduct('${h.barcode}')">
        <div class="history-dot" style="background:${gradeColors[h.grade] || 'var(--bg-elevated)'}"></div>
        <div class="history-item-info">
          <div class="history-item-name">${h.name}</div>
          <div class="history-item-brand">${h.brand}</div>
        </div>
        ${h.grade ? `<div class="history-item-grade" style="color:${gradeColors[h.grade]}">${h.grade.toUpperCase()}</div>` : ''}
      </div>
    `).join('');
  }

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2400);
  }
</script>

</body>
</html>
